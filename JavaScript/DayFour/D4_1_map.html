    <style></style>
    <body>
        <div>
            <input id="ip" type="text"> 
        <button onclick="display()" >VOTE</button>
        </div>
        <div id="res"></div>
        
    </body>
    <script>
        let arr=document.getElementById('ip').value.split(' ').map(Number);
        function mySum(total,ele){
            return total+ele;
        }
        function mean(){
            let sum=arr.reduce(mySum);
            return sum/(arr.length);
        }
        function median(){
            arr.sort((a,b)=>(a-b));
            if(arr.length%2===0){
                return (arr[Math.floor((arr.length-1)/2)]+arr[Math.floor((arr.length)/2)])/2;
            }
            else
            return arr[Math.floor((arr.length)/2)];
        }
        function display(){
            let means=mean();
            let medians=median();
            document.getElementById("res").innerHTML="MEAN: "+means+"   "+"MEDIAN: "+medians;
        }
