<!DOCTYPE html>
<html>
    <head>
        <title>
            Accessing Elements
        </title>
    </head>
    <style>
    </style>
    <body>
        <div>
            <input type="text" id="op" class="inputValue">
            <button onclick="test()">Click</button>
        </div>
        <div id="ip"></div>
    </body>
    <script>
        function test(){
           // let a=document.getElementById("op").value;
          // let a=document.getElementsByClassName("inputValue")[0].value;
          let paragraphs=document.getElementsByTagName("input")[0].value;
            document.getElementById("ip").innerHTML=paragraphs;
        }
    </script>
</html>
