<!DOCTYPE html>
<html>
<head>
    <title>DOM Practice</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            transition: all 0.3s ease;
        }

        button {
            padding: 10px 15px;
            margin: 8px;
            border: none;
            border-radius: 6px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .item {
            color: blue;
            font-size: 18px;
            margin-top: 10px;
        }

        img {
            margin-top: 20px;
            width: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1 id="myTitle">Original Title</h1>

    <button id="changeBtn">Change Title</button>
    <button id="addBtn">Add Paragraph</button>
    <button id="removeBtn">Remove Image</button>

    <br>

    <img id="myImage" src="https://via.placeholder.com/200" alt="Sample Image">

    <script>
        // Change title text and style
        document.getElementById("changeBtn").addEventListener("click", function () {
            let title = document.getElementById("myTitle");
            title.textContent = "Updated Title via DOM";
            title.style.color = "red";
            title.style.fontSize = "28px";
            //window.print("suresh");
        });

        // Add a new paragraph dynamically
        document.getElementById("addBtn").addEventListener("click", function () {
            let newPara = document.createElement("p");
            newPara.textContent = "New dynamically added item";
            newPara.className = "item";
            document.body.appendChild(newPara);
            window.print("suresh");
            //document.write("Mohan");
        });

        // Remove the image element
        document.getElementById("removeBtn").addEventListener("click", function () {
            let img = document.getElementById("myImage");
            if (img) {
                img.remove();
            } else {
                alert("Image is already deleted");
            }
        });
    </script>

</body>
</html>
