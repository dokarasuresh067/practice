<!DOCTYPE html>
<html>
    <head>
        <title>Form</title>
    </head>
   <style>

   </style>
   <body>
        <div>
            <form action="">
            <input type="text" id="ip">
            <input type="button" value="start Now"  onclick="test()">
        </form>
        </div>
        <div id="op"></div>
        <script>
          function test(){
                //var a=document.getElementById("ip"); displays [object HTMLInputElement] 
                var a=parseInt(document.getElementById("ip").value);
                var ans=add(a);
                document.getElementById("op").innerHTML=ans;
          }
          function add(a){
                if(a>0)
                    return a+add(a-1);
                return 0;
          }
          
        </script>
   </body>
</html>
