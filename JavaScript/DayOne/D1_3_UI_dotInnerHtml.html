<!DOCTYPE html>
<html>
    <head>
        <title>Form</title>
    </head>
   <style>

   </style>
   <body>
        <div>
            <form action="">
            <input type="text" id="ip">
            <input type="button" value="start Now"  onclick="test()">
        </form>
        </div>
        <div id="op"></div>
        <script>
          function test(){
                //var a=document.getElementById("ip"); displays [object HTMLInputElement] 
                var a=document.getElementById("ip").value; //displays the value entered in the input box
                document.getElementById('op').innerHTML = a;
          }
        </script>
   </body>
</html>
