<!DOCTYPE html>
<html>
<head>
    <title>Table of Contents</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5 text-center">

        <h2 class="mb-4">People Table</h2>

        <div class="input-group mb-4">
            <input type="text" id="st" class="form-control" placeholder="Enter something">
            <button class="btn btn-primary" onclick="test()">Enter</button>
        </div>

        <div id="ip"></div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function test(){
            const people = [
                {name:"Suresh",age:21},
                {name:"Ramesh",age:21},
                {name:"Ganesh",age:21},
                {name:"Yugesh",age:21}
            ];

            // Bootstrap styled table
            var tbegin = `
                <table class="table table-success table-striped">
                <thead >
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                    </tr>
                </thead>
                <tbody>
            `;

            var tend = "</tbody></table>";
            var ans = "";

            for(let i=0;i<people.length;i++){
                ans += `<tr>
                            <td>${people[i].name}</td>
                            <td>${people[i].age}</td>
                        </tr>`;
            }

            document.getElementById("ip").innerHTML = tbegin + ans + tend;
        }
    </script>

</body>
</html>
